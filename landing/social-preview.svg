<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">TPV Elite</title>
  <desc id="desc">Vista social de la landing de TPV Elite con foco en ventas, stock y pedidos.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="52%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <circle cx="1030" cy="110" r="180" fill="#38BDF8" opacity="0.14"/>
  <circle cx="170" cy="560" r="220" fill="#8B5CF6" opacity="0.18"/>
  <rect x="72" y="72" width="1056" height="486" rx="36" fill="url(#card)" stroke="rgba(255,255,255,0.12)"/>
  <rect x="104" y="104" width="148" height="56" rx="18" fill="rgba(255,255,255,0.08)"/>
  <text x="128" y="142" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">TPV Elite</text>
  <text x="104" y="230" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="800">Vende más.</text>
  <text x="104" y="306" fill="#E5E7EB" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="800">Controla mejor.</text>
  <text x="104" y="374" fill="#CBD5E1" font-family="Arial, Helvetica, sans-serif" font-size="28">Caja, stock, pedidos y reportes en una sola app de escritorio.</text>
  <rect x="104" y="426" width="242" height="58" rx="29" fill="url(#accent)"/>
  <text x="145" y="463" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Descarga la versión actual</text>
  <g transform="translate(736 138)">
    <rect x="0" y="0" width="336" height="324" rx="28" fill="#0F172A" stroke="rgba(255,255,255,0.1)"/>
    <rect x="22" y="22" width="292" height="34" rx="12" fill="rgba(255,255,255,0.06)"/>
    <rect x="22" y="78" width="120" height="90" rx="18" fill="#1D4ED8" opacity="0.95"/>
    <rect x="154" y="78" width="160" height="90" rx="18" fill="#10B981" opacity="0.92"/>
    <rect x="22" y="180" width="292" height="100" rx="18" fill="rgba(255,255,255,0.05)"/>
    <rect x="38" y="198" width="260" height="12" rx="6" fill="rgba(255,255,255,0.18)"/>
    <rect x="38" y="224" width="208" height="12" rx="6" fill="rgba(255,255,255,0.12)"/>
    <rect x="38" y="250" width="246" height="12" rx="6" fill="rgba(255,255,255,0.12)"/>
    <text x="38" y="132" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Ventas del día</text>
    <text x="176" y="132" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="24" font-weight="700">Stock al día</text>
  </g>
</svg>

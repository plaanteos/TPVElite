[pytest]
# Configuración de pytest para el Sistema TPV

# Directorio de tests
testpaths = tests

# Patrón de archivos de test
python_files = test_*.py

# Patrón de clases de test
python_classes = Test*

# Patrón de funciones de test
python_functions = test_*

# Opciones de salida
addopts = 
    -v
    --tb=short
    --strict-markers

# Marcadores personalizados
markers =
    unit: Tests unitarios de servicios
    integration: Tests de integración
    slow: Tests que toman tiempo en ejecutar
    
# Configuración de cobertura
[coverage:run]
omit = 
    tests/*
    */__pycache__/*
    */venv/*
    */build/*
    */dist/*
    main.py
    
[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    raise AssertionError
    raise NotImplementedError
    if __name__ == .__main__.:
    if TYPE_CHECKING:
    @abstractmethod
